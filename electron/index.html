<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>winbuddy</title>
<style>
  :root {
    --bg: #1a1d23;
    --surface: #23272f;
    --surface-2: #2b3038;
    --border: #363c46;
    --text: #e8eaed;
    --muted: #9aa0a8;
    --accent: #4db6a5;        /* спокойная бирюза — безопасность */
    --accent-dim: #2f6b61;
    --warn: #e0a458;          /* янтарь — шлагбаум подтверждения */
    --warn-bg: #2e2820;
    --danger: #d97066;
    --mono: ui-monospace, "Cascadia Code", "Consolas", monospace;
    --sans: -apple-system, "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }
  header .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--danger); transition: background .3s;
  }
  header .dot.online { background: var(--accent); }
  header h1 {
    font-size: 15px; font-weight: 600; letter-spacing: .3px;
  }
  header .sub {
    font-size: 12px; color: var(--muted); margin-left: auto;
    font-family: var(--mono);
  }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg { max-width: 92%; }
  .msg.user {
    align-self: flex-end;
    background: var(--accent-dim);
    color: #eafaf6;
    padding: 10px 14px;
    border-radius: 12px 12px 3px 12px;
    white-space: pre-wrap;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 15px;
    border-radius: 12px 12px 12px 3px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .msg.step {
    align-self: flex-start;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    padding: 2px 6px;
  }
  .msg.step .args { color: var(--muted); }

  /* Сигнатурный элемент — панель подтверждения (шлагбаум) */
  .guardrail {
    align-self: stretch;
    background: var(--warn-bg);
    border: 1px solid var(--warn);
    border-left: 4px solid var(--warn);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .guardrail .title {
    color: var(--warn);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: .4px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .guardrail pre {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    background: #1e1b16;
    border-radius: 6px;
    padding: 10px;
    overflow-x: auto;
    max-height: 260px;
    margin-bottom: 12px;
  }
  .guardrail .actions { display: flex; gap: 10px; }
  .guardrail button {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
  }
  .btn-approve { background: var(--warn); color: #241d10; }
  .btn-approve:hover { filter: brightness(1.08); }
  .btn-reject { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-reject:hover { color: var(--text); border-color: var(--muted); }
  .guardrail.decided { opacity: .55; }
  .guardrail.decided .actions { display: none; }
  .decision-label { font-size: 12px; font-family: var(--mono); }

  .result-ok {
    align-self: flex-start;
    border-left: 3px solid var(--accent);
    background: var(--surface);
    padding: 8px 12px; border-radius: 4px;
    font-family: var(--mono); font-size: 12px; color: var(--accent);
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    background: var(--surface);
    display: flex; gap: 10px;
  }
  #input {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 11px 14px;
    border-radius: 8px;
    resize: none;
    outline: none;
  }
  #input:focus { border-color: var(--accent); }
  #send {
    background: var(--accent); color: #10201d;
    border: none; border-radius: 8px;
    padding: 0 22px; font-weight: 600; font-size: 14px;
    cursor: pointer;
  }
  #send:disabled { opacity: .5; cursor: default; }

  .hint { color: var(--muted); font-size: 12px; padding: 4px; text-align: center; }
</style>
</head>
<body>
  <header>
    <span class="dot" id="statusDot"></span>
    <h1>winbuddy</h1>
    <span class="sub" id="statusText">подключение…</span>
  </header>

  <div id="log">
    <div class="hint">Опиши задачу обычным языком — напр. «проанализируй диск D» или «почисти мусор в D:\orgtest».</div>
  </div>

  <footer>
    <textarea id="input" rows="1" placeholder="Напиши задачу…"></textarea>
    <button id="send">Отправить</button>
  </footer>

  <script src="renderer.js"></script>
</body>
</html>
